<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../src/styles-principal.css">
    <link rel="stylesheet" href="./styles-validador.css">
    <title>Comparador Precios</title>
</head>
<body class="portfolio-page">
    <header class="container-header">
        <nav class="container-nav">
            <ul class="container-nav_lista">
                <li class="nav-elements"><a href="../../index.html">Home</a></li>
                <li class="nav-elements"><a href="../../ejercicios-indice.html">Ejercicios</a></li>
                <li class="nav-elements"><a href="../../paginas-web-indice.html">Páginas Web</a></li>
            </ul>
            <span class="menu-nav">=</span>
        </nav>
    </header>

    <section class="container">
        <h1>VALIDADOR DE PRECIOS</h1>
        <select class="lista-productos" name="Productos" id="productos">
            <option class="lista-item" value="pollo">KG DE POLLO</option>
            <option class="lista-item"value="carne">KG DE CARNE</option>
            <option class="lista-item"value="chuletaRes">KG DE CHULETA DE RES</option>
            <option class="lista-item"value="chuletaChancho">KG DE CHULETA DE CHANCHO</option>
        </select>
        <input type="text" id="input-price" inputmode="decimal" maxlength="6" placeholder="0.00">
        <button id="btn-cotizar">Cotizar</button>
    </section>

    <div id="custom-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-title">Resultado de Cotización</h3>
            <p id="modal-message">Aquí irá el texto del precio...</p>
            <button id="modal-close">Aceptar</button>
        </div>
    </div>

    <script src="../../main.js"></script>
    <script src="./validador.js"></script>
</body>
</html>
